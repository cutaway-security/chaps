# CHAPS Remote Testing Configuration
#
# Copy this file to remote-testing.local.conf and fill in real values.
# The local file is gitignored and must NEVER be committed.
#
# Usage:
#   source claude-dev/remote-testing.local.conf
#   scp -i $SSH_KEY_PATH PowerShellv3/chaps_PSv3.ps1 $VM_WIN10:C:/Temp/
#   ssh -i $SSH_KEY_PATH $VM_WIN10 "powershell -ExecutionPolicy Bypass -File C:\Temp\chaps_PSv3.ps1"

# Proxmox host
PROXMOX_HOST=<lab-host>
PROXMOX_USER=<proxmox-user>

# SSH key for VM access
SSH_KEY_PATH=~/.ssh/chaps_dev_ed25519

# Test VMs -- format: <user>@<host-or-ip>
VM_WIN7=<lab-user>@<vm-name>
VM_WIN10=<lab-user>@<vm-name>
VM_WIN11=<lab-user>@<vm-name>
VM_SRV2016=<lab-user>@<vm-name>
VM_SRV2019=<lab-user>@<vm-name>
VM_SRV2022=<lab-user>@<vm-name>
